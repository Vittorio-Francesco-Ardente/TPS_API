<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APIFlow Studio — Dashboard Tecnica API Moderne</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* ─── LOADING SCREEN ─── */
      * { margin:0; padding:0; box-sizing:border-box; }
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #0c1322;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        overflow: hidden;
        transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1), visibility 1.5s;
      }
      #app-loader.fade-out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Background ambient glow */
      .loader-bg-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
      }
      .loader-bg-orb-1 {
        width: 400px; height: 400px;
        top: -100px; left: -100px;
        background: radial-gradient(circle, rgba(14,165,233,0.2), transparent 70%);
        animation: loaderOrbPulse 4s ease-in-out infinite;
      }
      .loader-bg-orb-2 {
        width: 350px; height: 350px;
        bottom: -80px; right: -80px;
        background: radial-gradient(circle, rgba(6,214,160,0.15), transparent 70%);
        animation: loaderOrbPulse 5s ease-in-out infinite 1s;
      }
      .loader-bg-orb-3 {
        width: 250px; height: 250px;
        top: 40%; left: 60%;
        background: radial-gradient(circle, rgba(139,92,246,0.1), transparent 70%);
        animation: loaderOrbPulse 6s ease-in-out infinite 2s;
      }

      /* Logo container */
      .loader-logo-wrap {
        position: relative;
        width: 120px;
        height: 120px;
        margin-bottom: 40px;
      }

      /* Outer rotating hexagon ring */
      .loader-hex-ring {
        position: absolute;
        inset: 0;
        animation: loaderRotate 8s linear infinite;
      }
      .loader-hex-ring svg {
        width: 100%;
        height: 100%;
      }
      .loader-hex-path {
        stroke-dasharray: 400;
        stroke-dashoffset: 400;
        animation: loaderHexDraw 2s ease-out forwards, loaderHexGlow 3s ease-in-out 2s infinite;
      }

      /* Inner orbiting dots */
      .loader-orbit {
        position: absolute;
        inset: 10px;
        animation: loaderRotate 4s linear infinite;
      }
      .loader-orbit-dot {
        position: absolute;
        width: 6px; height: 6px;
        border-radius: 50%;
        background: #0ea5e9;
        box-shadow: 0 0 12px rgba(14,165,233,0.6);
      }
      .loader-orbit-dot-1 { top: -3px; left: 50%; margin-left: -3px; }
      .loader-orbit-dot-2 { bottom: -3px; left: 50%; margin-left: -3px; background: #06d6a0; box-shadow: 0 0 12px rgba(6,214,160,0.6); }

      .loader-orbit-2 {
        position: absolute;
        inset: 22px;
        animation: loaderRotate 3s linear infinite reverse;
      }
      .loader-orbit-dot-3 { top: 50%; right: -3px; margin-top: -3px; width: 4px; height: 4px; background: #8b5cf6; box-shadow: 0 0 10px rgba(139,92,246,0.6); border-radius: 50%; position: absolute; }

      /* Central logo icon */
      .loader-center-logo {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 48px; height: 48px;
        animation: loaderLogoPulse 2s ease-in-out infinite;
      }
      .loader-center-logo svg {
        width: 100%; height: 100%;
        filter: drop-shadow(0 0 20px rgba(14,165,233,0.4));
      }

      /* Text */
      .loader-title {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 3px;
        background: linear-gradient(90deg, #0ea5e9, #06d6a0, #8b5cf6);
        background-size: 200% 100%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: loaderGradientShift 3s ease-in-out infinite;
        margin-bottom: 8px;
      }
      .loader-subtitle {
        font-size: 11px;
        color: #5b6b82;
        letter-spacing: 1.5px;
        margin-bottom: 32px;
      }
      .loader-dots-anim::after {
        content: '';
        animation: loaderDotsAnim 1.5s steps(4) infinite;
      }

      /* Progress bar */
      .loader-progress-track {
        width: 220px;
        height: 2px;
        background: #1a2744;
        border-radius: 2px;
        overflow: hidden;
        position: relative;
      }
      .loader-progress-fill {
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, #0ea5e9, #06d6a0);
        border-radius: 2px;
        transform-origin: left;
        transform: scaleX(0);
        animation: loaderProgress 1s ease-out forwards;
      }
      .loader-progress-shimmer {
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        animation: loaderShimmer 1.5s ease-in-out infinite;
      }

      /* Floating particles */
      .loader-particle {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
        animation: loaderParticleFloat linear infinite;
      }

      @keyframes loaderRotate { to { transform: rotate(360deg); } }
      @keyframes loaderOrbPulse { 0%,100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.15); opacity: 1; } }
      @keyframes loaderHexDraw { to { stroke-dashoffset: 0; } }
      @keyframes loaderHexGlow { 0%,100% { filter: drop-shadow(0 0 6px rgba(14,165,233,0.3)); } 50% { filter: drop-shadow(0 0 18px rgba(14,165,233,0.6)); } }
      @keyframes loaderLogoPulse { 0%,100% { transform: translate(-50%,-50%) scale(1); } 50% { transform: translate(-50%,-50%) scale(1.08); } }
      @keyframes loaderGradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
      @keyframes loaderDotsAnim { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }
      @keyframes loaderProgress {
        0% { transform: scaleX(0); }
        100% { transform: scaleX(1); }
      }
      @keyframes loaderShimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }
      @keyframes loaderParticleFloat {
        0% { transform: translateY(0) translateX(0); opacity: 0; }
        10% { opacity: 0.8; }
        90% { opacity: 0.8; }
        100% { transform: translateY(-150px) translateX(30px); opacity: 0; }
      }
    </style>

re oltre i firewall aziendali. SOAP risolse entrambi i problemi sfruttando HTTP come trasporto (superando i firewall) e XML come formato di serializzazione (garantendo interoperabilità). La prima specifica pubblica fu SOAP 1.0, seguita dalla versione 1.1 nel 2000 e dalla ratifica W3C come Recommendation nel 2003 con SOAP 1.2."},{title:"2. Anatomia del messaggio SOAP",text:"Ogni messaggio SOAP è racchiuso in una struttura XML rigidamente definita chiamata Envelope. L'Envelope contiene due sezioni principali: Header e Body. L'Header è opzionale e trasporta metadati come informazioni di autenticazione (WS-Security), routing, transazioni distribuite (WS-AtomicTransaction) e correlazione dei messaggi. Il Body contiene il payload effettivo della richiesta o della risposta. In caso di errore, il Body ospita un elemento Fault con codice d'errore, descrizione leggibile e dettagli tecnici. Questa separazione netta tra metadati e dati applicativi è uno dei punti di forza architetturali di SOAP: permette ai middleware di processare gli header senza necessità di comprendere il contenuto business del body."},{title:"3. WSDL e il contratto formale",text:`L'aspetto che distingue SOAP da qualsiasi altro protocollo di comunicazione è la sua dipendenza da WSDL (Web Services Description Language). Un file WSDL è un documento XML che descrive in modo completo e machine-readable l'interfaccia di un servizio: quali operazioni espone, quali parametri accetta, quali tipi di dato utilizza (definiti tramite XML Schema) e su quali endpoint è raggiungibile. Questo approccio "contract-first" significa che client e server concordano formalmente sulle strutture dati prima di scambiare un singolo byte. Strumenti come Apache CXF, JAX-WS e il vecchio Microsoft WSDL.exe generano automaticamente il codice client (stub) e server (skeleton) a partire dal WSDL. Il vantaggio è enorme in ambienti enterprise dove team diversi — spesso in aziende diverse — devono integrarsi con garanzie di compatibilità.`},{title:"4. Standard WS-* e sicurezza enterprise",text:"Attorno a SOAP è cresciuto un ecosistema di specifiche complementari note come WS-* (WS-Star). WS-Security gestisce firma digitale XML, crittografia e token SAML. WS-ReliableMessaging garantisce la consegna ordinata e senza duplicati dei messaggi. WS-AtomicTransaction coordina transazioni distribuite tra più servizi. WS-Addressing permette il routing indipendente dal trasporto. WS-Policy descrive le capability e i requisiti di un servizio in modo machine-readable. Questo stack, seppur complesso, offre garanzie che nessun altro protocollo web può eguagliare: è la ragione per cui SOAP resta dominante in settori come banking, assicurazioni, sanità e pubblica amministrazione dove compliance normativa e audit trail sono requisiti non negoziabili."},{title:"5. Limiti e posizione nell'ecosistema moderno",text:`SOAP paga il prezzo della sua robustezza con una verbosità significativa. Un messaggio SOAP può essere 10-20 volte più pesante dell'equivalente JSON in REST o della rappresentazione binaria in gRPC. Il parsing XML è computazionalmente costoso rispetto a JSON. La curva di apprendimento è ripida: comprendere WSDL, XML Schema, SOAP Fault handling e gli standard WS-* richiede settimane. Tuttavia, liquidare SOAP come "obsoleto" è un errore: il sistema interbancario SWIFT, i servizi governativi di mezza Europa, l'infrastruttura SAP e centinaia di sistemi critici continuano a funzionare su SOAP. La migrazione verso REST o gRPC avviene gradualmente, spesso con pattern di facade che espongono API REST mantenendo backend SOAP.`}]},codeSnippets:[{title:"request_envelope.xml",lang:"xml",code:`<?xml version="1.0" encoding="UTF-8"?>
<soap:Envelope
  xmlns:soap="http://www.w3.org/2003/05/soap-envelope"
  xmlns:ws="http://example.com/weather">
  <soap:Header>
    <wsse:Security
      xmlns:wsse="http://docs.oasis-open.org/wss/2004/01/oasis-200401-wss-wssecurity-secext-1.0.xsd">
      <wsse:UsernameToken>
        <wsse:Username>api_user</wsse:Username>
        <wsse:Password>secure_token_2024</wsse:Password>
      </wsse:UsernameToken>
    </wsse:Security>
  </soap:Header>
  <soap:Body>
    <ws:GetWeatherForecast>
      <ws:City>Milano</ws:City>
      <ws:Days>5</ws:Days>
      <ws:Units>metric</ws:Units>
    </ws:GetWeatherForecast>
  </soap:Body>
</soap:Envelope>`},{title:"wsdl_excerpt.xml",lang:"xml",code:`<definitions name="WeatherService"
  xmlns="http://schemas.xmlsoap.org/wsdl/"
  xmlns:soap="http://schemas.xmlsoap.org/wsdl/soap/"
  xmlns:tns="http://example.com/weather"
  targetNamespace="http://example.com/weather">

  <types>
    <xsd:schema targetNamespace="http://example.com/weather">
      <xsd:element name="GetWeatherForecast">
        <xsd:complexType>
          <xsd:sequence>
            <xsd:element name="City" type="xsd:string"/>
            <xsd:element name="Days" type="xsd:int"/>
          </xsd:sequence>
        </xsd:complexType>
      </xsd:element>
    </xsd:schema>
  </types>

  <message name="GetWeatherRequest">
    <part name="parameters" element="tns:GetWeatherForecast"/>
  </message>

  <portType name="WeatherPortType">
    <operation name="GetWeatherForecast">
      <input message="tns:GetWeatherRequest"/>
      <output message="tns:GetWeatherResponse"/>
    </operation>
  </portType>
</definitions>`},{title:"client_zeep.py",lang:"python",code:`from zeep import Client
from zeep.wsse.username import UsernameToken
from zeep.transports import Transport
from requests import Session

# Configura sessione con timeout e retry
session = Session()
session.verify = True  # Verifica certificati SSL
transport = Transport(session=session, timeout=30)

# Autenticazione WS-Security
wsse = UsernameToken('api_user', 'secure_token_2024')

# Crea client dal WSDL
client = Client(
    'https://api.example.com/weather?wsdl',
    wsse=wsse,
    transport=transport
)

# Invoca l'operazione
response = client.service.GetWeatherForecast(
    City='Milano',
    Days=5,
    Units='metric'
)

# Gestisci la risposta
for day in response.Forecast.Day:
    print(f"{day.Date}: {day.TempMin}°C - {day.TempMax}°C, {day.Condition}")`}],cases:[{company:"SWIFT (Interbancario Globale)",year:"2004",problem:"SWIFT doveva collegare oltre 11.000 istituzioni finanziarie in 200+ paesi con garanzie di integrità, non-ripudio e conformità normativa. Il protocollo proprietario FIN era costoso e rigido.",metric:"SWIFT FINplus su SOAP gestisce 42 milioni di messaggi/giorno con SLA del 99.999%",link:"https://www.swift.com/standards/iso-20022"},{company:"SAP Enterprise Integration",year:"2002",problem:"SAP necessitava di un protocollo standard per connettere moduli ERP, CRM e SCM tra aziende diverse. DCOM e CORBA erano troppo legati a specifici stack tecnologici e non attraversavano i firewall.",metric:"SAP PI/PO gestisce 500+ milioni di messaggi SOAP/giorno per oltre 400.000 clienti enterprise",link:"https://help.sap.com/docs/SAP_NETWEAVER"},{company:"Agenzia delle Entrate (Italia)",year:"2006",problem:"La fatturazione elettronica e le dichiarazioni fiscali richiedevano un canale sicuro, validabile e legalmente vincolante tra contribuenti, intermediari e PA. SOAP con WS-Security soddisfava i requisiti normativi.",metric:"2.2 miliardi di fatture elettroniche transitate via SDI nel 2023, tutte su envelope SOAP",link:"https://www.fatturapa.gov.it/it/index.html"}],radar:{latency:3,scalability:5,simplicity:2,overhead:2,browser:4,maturity:10}},{id:"graphql",name:"GraphQL",color:c.rose,colorDim:c.roseDim,tagline:"Query language per API — Chiedi esattamente ciò che ti serve",paradigm:"Query",transport:"HTTP",format:"JSON",browser:"Sì (nativo)",year:"2012",port:"80 / 443",standard:"GraphQL Foundation (Linux Foundation)",specLink:"https://spec.graphql.org/",specLabel:"GraphQL Spec (graphql.org)",icon:cp,overview:{sections:[{title:"1. La nascita in Facebook e il problema dell'over-fetching",text:"GraphQL nasce nel 2012 all'interno di Facebook, ideato da Lee Byron, Dan Schafer e Nick Schrock. Il contesto era la ricostruzione dell'app mobile di Facebook, che nel 2012 era una web view lentissima. Il team mobile aveva bisogno di richiedere dati altamente specifici — il nome di un utente, le sue ultime 3 foto, i commenti dei primi 2 amici — ma le API REST esistenti restituivano oggetti completi con decine di campi inutilizzati (over-fetching) oppure richiedevano multiple chiamate concatenate per assemblare una singola schermata (under-fetching con N+1 requests). GraphQL risolve entrambi i problemi permettendo al client di dichiarare esattamente la forma dei dati necessari in una singola query."},{title:"2. Il type system e lo schema come contratto",text:"Il cuore di GraphQL è il suo type system. Ogni API GraphQL è definita da uno schema SDL (Schema Definition Language) che dichiara tipi, campi, relazioni e operazioni disponibili. Lo schema funge da contratto tra frontend e backend: è strongly-typed, auto-documentante e introspectable. Un client può interrogare lo schema stesso (introspection query) per scoprire quali operazioni sono disponibili, quali campi ha ogni tipo, quali sono obbligatori e quali nullable. Questo abilita strumenti come GraphiQL e Apollo Explorer che offrono autocompletamento, validazione in tempo reale e documentazione generata automaticamente. Lo schema definisce tre root types: Query (lettura), Mutation (scrittura) e Subscription (eventi in tempo reale via WebSocket)."},{title:"3. Resolver architecture e data fetching",text:"Quando il server riceve una query GraphQL, il motore di esecuzione la valida contro lo schema, poi la risolve campo per campo invocando funzioni chiamate resolvers. Ogni campo nello schema ha un resolver associato (esplicito o implicito per i campi triviali). I resolvers possono attingere da qualsiasi fonte: database SQL, API REST esistenti, microservizi gRPC, cache Redis, file system. Questa architettura rende GraphQL un eccellente layer di aggregazione: un singolo endpoint GraphQL può unificare decine di backend eterogenei dietro un'interfaccia coerente. Il pattern DataLoader (creato anch'esso da Facebook) risolve il problema N+1 batching e caching le richieste ai data source sottostanti all'interno di un singolo tick di esecuzione."},{title:"4. Fragments, Variables e ottimizzazione delle query",text:`GraphQL offre costrutti avanzati per riuso e parametrizzazione. I Fragments permettono di definire set di campi riutilizzabili: un fragment "UserBasicInfo" con id, nome e avatar può essere incluso in qualsiasi query che tocchi un utente, evitando duplicazione. Le Variables separano la struttura della query dai valori dinamici, abilitando query pre-compilate e cacheable (Persisted Queries). Le Directives (@include, @skip, @deprecated, custom directives) aggiungono logica condizionale. Apollo Client e Relay, i due principali client-side framework, implementano cache normalizzata che deduplica le entità per ID, aggiorna automaticamente la UI quando una mutation modifica un'entità già in cache e supporta optimistic updates per percepita zero-latency.`},{title:"5. Sfide e considerazioni architetturali",text:"GraphQL non è privo di complessità. La flessibilità delle query espone al rischio di query costose: un client malevolo potrebbe richiedere grafi profondamente annidati causando query N+1 esplosive sul database. Mitigazioni includono query depth limiting, query complexity analysis e persisted queries (whitelist). Il caching HTTP è meno immediato rispetto a REST perché tutte le richieste sono POST sullo stesso endpoint; soluzioni come Apollo Cache, CDN-level caching con @cacheControl e Automatic Persisted Queries (APQ) compensano. La curva di apprendimento per implementare un server GraphQL production-ready — con DataLoader, autenticazione per campo, rate limiting per complessità, subscriptions WebSocket — è significativa. Nonostante ciò, l'adozione continua a crescere: GitHub, Shopify, Twitter, Yelp, Airbnb e centinaia di aziende lo usano in produzione."}]},codeSnippets:[{title:"schema.graphql",lang:"graphql",code:`type User {
  id: ID!
  username: String!
  email: String!
  avatar: String
  posts(first: Int = 10, after: String): PostConnection!
  followers: [User!]!
  followersCount: Int!
  createdAt: DateTime!
}

type Post {
  id: ID!
  title: String!
  content: String!
  author: User!
  tags: [Tag!]!
  comments(first: Int = 5): [Comment!]!
  likesCount: Int!
  publishedAt: DateTime
  status: PostStatus!
}

enum PostStatus {
  DRAFT
  PUBLISHED
  ARCHIVED
}

type PostConnection {
  edges: [PostEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type Query {
  user(id: ID!): User
  posts(filter: PostFilter, first: Int, after: String): PostConnection!
  searchPosts(query: String!): [Post!]!
}

type Mutation {
  createPost(input: CreatePostInput!): Post!
  updatePost(id: ID!, input: UpdatePostInput!): Post!
  deletePost(id: ID!): Boolean!
  toggleLike(postId: ID!): Post!
}`},{title:"query_fragments.graphql",lang:"graphql",code:`# Fragment riutilizzabile per info utente base
fragment UserBasicInfo on User {
  id
  username
  avatar
}

# Query con fragment, variabili e paginazione
query GetUserProfile($userId: ID!, $postsFirst: Int = 5) {
  user(id: $userId) {
    ...UserBasicInfo
    email
    followersCount
    createdAt
    posts(first: $postsFirst) {
      edges {
        node {
          id
          title
          content
          status
          likesCount
          publishedAt
          tags {
            name
            color
          }
          comments(first: 3) {
            id
            text
            author {
              ...UserBasicInfo
            }
          }
        }
      }
      pageInfo {
        hasNextPage
        endCursor
      }
      totalCount
    }
  }
}

# Variabili (inviate come JSON separato)
# { "userId": "usr_42", "postsFirst": 10 }`},{title:"mutation_variables.graphql",lang:"graphql",code:`# Mutation con input type e variabili
mutation CreateNewPost($input: CreatePostInput!) {
  createPost(input: $input) {
    id
    title
    content
    status
    publishedAt
    author {
      id
      username
    }
    tags {
      name
    }
  }
}

# Subscription per aggiornamenti real-time
subscription OnPostPublished($authorId: ID) {
  postPublished(authorId: $authorId) {
    id
    title
    author {
      username
    }

iamate al secondo tra i microservizi della sua infrastruttura. Nel 2015, Google rilascia gRPC come progetto open source con l'obiettivo di portare le stesse performance e affidabilità a tutto l'ecosistema cloud-native. La "g" in gRPC non sta ufficialmente per "Google" — ogni release sceglie un significato diverso (good, green, groovy). Il framework è ora un progetto graduated della Cloud Native Computing Foundation (CNCF), alla pari di Kubernetes e Prometheus.`},{title:"2. Protocol Buffers: serializzazione binaria tipizzata",text:"gRPC utilizza Protocol Buffers (protobuf) come IDL (Interface Definition Language) e formato di serializzazione. Un file .proto definisce servizi, metodi e messaggi con tipi scalari precisi (int32, int64, float, double, string, bytes, bool), tipi composti (message, enum, oneof, map) e regole di campo (singular, repeated, optional). Il compilatore protoc genera codice client e server in 12+ linguaggi (C++, Java, Python, Go, C#, Node.js, Ruby, PHP, Kotlin, Dart, Swift, Rust). La serializzazione binaria protobuf è 3-10x più veloce di JSON e produce messaggi 3-5x più compatti. Il formato è backward e forward compatible: campi aggiunti con nuovi numeri di campo non rompono i client esistenti."},{title:"3. HTTP/2 multiplexing e i quattro pattern di streaming",text:"gRPC sfrutta HTTP/2 come trasporto, beneficiando di multiplexing (più chiamate sulla stessa connessione TCP), header compression (HPACK), flow control e server push. Questo elimina il problema del head-of-line blocking di HTTP/1.1. gRPC definisce quattro pattern di comunicazione: Unary RPC (request-response classico), Server Streaming (il server invia uno stream di messaggi), Client Streaming (il client invia uno stream e il server risponde alla fine), Bidirectional Streaming (entrambi inviano stream concorrenti sulla stessa connessione). Il bidirectional streaming è particolarmente potente per scenari real-time come chat, telemetria IoT e sincronizzazione di stato tra servizi."},{title:"4. Interceptors, Metadata e gestione degli errori",text:"gRPC implementa un sistema di interceptors (middleware) che permette di aggiungere logica cross-cutting come autenticazione, logging, tracing (OpenTelemetry), rate limiting e retry automatico. I metadata sono l'equivalente degli HTTP headers e trasportano informazioni di contesto come token di autenticazione, correlation ID e timeout. Il sistema di errori utilizza codici di stato semantici derivati da HTTP ma più granulari: UNAVAILABLE, DEADLINE_EXCEEDED, RESOURCE_EXHAUSTED, PERMISSION_DENIED, UNIMPLEMENTED, INTERNAL. Ogni errore può includere dettagli strutturati tramite il package google.rpc.Status. Le deadline (timeout) si propagano automaticamente attraverso la catena di microservizi, evitando che un servizio lento blocchi l'intera pipeline."},{title:"5. Ecosistema e adozione nel mondo cloud-native",text:"gRPC è diventato lo standard de facto per la comunicazione inter-servizio nel mondo Kubernetes e microservizi. Service mesh come Istio e Linkerd supportano nativamente gRPC con load balancing, mutual TLS e observability. etcd (il key-value store di Kubernetes) usa gRPC per tutte le sue API. CockroachDB, TiDB e Vitess lo usano per la comunicazione tra nodi del database distribuito. Nel mondo mobile, Flutter (il framework UI di Google) usa gRPC per la comunicazione con i backend. Tuttavia, gRPC ha limitazioni nel browser: HTTP/2 framing non è accessibile direttamente da JavaScript, richiedendo un proxy gRPC-Web (come Envoy) che traduce le chiamate. Questo lo rende meno adatto per API pubbliche direttamente consumate da web app."}]},codeSnippets:[{title:"user_service.proto",lang:"protobuf",code:`syntax = "proto3";

  rpc GetUser(GetUserRequest) returns (User);

  // Server streaming - stream di risultati
  rpc ListUsers(ListUsersRequest) returns (stream User);

  USER_ROLE_ADMIN = 1;
  USER_ROLE_EDITOR = 2;
  USER_ROLE_VIEWER = 3;
}

message GetUserRequest {

}

  string page_token = 2;

from concurrent import futures
import user_service_pb2 as pb2
import user_service_pb2_grpc as pb2_grpc
from google.protobuf.timestamp_pb2 import Timestamp
import time

class UserServiceServicer(pb2_grpc.UserServiceServicer):
    def __init__(self):
        self.users_db = {}

    def GetUser(self, request, context):
        """Unary RPC: restituisce un singolo utente per ID."""
        user = self.users_db.get(request.user_id)
        if not user:
            context.abort(
                grpc.StatusCode.NOT_FOUND,
                f"Utente {request.user_id} non trovato"
            )
        return user

    def ListUsers(self, request, context):
        """Server Streaming: invia gli utenti uno alla volta."""
        users = list(self.users_db.values())
        for i, user in enumerate(users):
            if request.page_size and i >= request.page_size:
                break
            yield user
            time.sleep(0.01)  # Simula latenza DB

    def SyncUserStatus(self, request_iterator, context):
        """Bidirectional Streaming: sincronizza stato real-time."""
        for status_update in request_iterator:
            print(f"Status update: {status_update.user_id}")
            # Processa e ri-trasmetti a tutti i subscriber
            yield status_update

def serve():
    server = grpc.server(
        futures.ThreadPoolExecutor(max_workers=10),
        options=[
            ('grpc.max_receive_message_length', 50 * 1024 * 1024),
        ]
    )
    pb2_grpc.add_UserServiceServicer_to_server(
        UserServiceServicer(), server
    )
    server.add_insecure_port('[::]:50051')
    server.start()
    print("Server gRPC avviato sulla porta 50051")
    server.wait_for_termination()

if __name__ == '__main__':
    serve()`},{title:"client.go",lang:"go",code:`package main

	}
	for {

			break

vamente il client quando si verifica un evento rilevante. Il termine "webhook" fu coniato nel 2007 da Jeff Lindsay, ispirandosi al concetto di "hook" nella programmazione (un punto in cui inserire codice custom per reagire a un evento). Il meccanismo è concettualmente semplice: il consumer registra un URL di callback presso il provider; quando si verifica un evento, il provider invia una HTTP POST a quell'URL con un payload JSON che descrive l'evento. Questa semplicità è la ragione del successo universale dei webhooks.`},{title:"2. Sicurezza: HMAC, firma e verifica del payload",text:"La sicurezza è l'aspetto più critico dei webhooks. Poiché il consumer espone un endpoint HTTP pubblico che riceve dati da terze parti, deve autenticare che la richiesta provenga realmente dal provider atteso e non da un attaccante. La soluzione standard è HMAC (Hash-based Message Authentication Code): il provider calcola un hash HMAC-SHA256 del payload usando un secret condiviso e lo include in un header (tipicamente X-Hub-Signature-256 o Webhook-Signature). Il consumer ricalcola l'hash con lo stesso secret e confronta; se non coincide, la richiesta viene rifiutata. Alcuni provider (come Stripe) aggiungono un timestamp nell'header per prevenire replay attack: il consumer verifica che il timestamp sia recente (tipicamente entro 5 minuti) prima di accettare il payload."},{title:"3. Retry logic e backoff esponenziale",text:"I webhooks operano su HTTP, che non garantisce la consegna. Se il consumer è temporaneamente offline o risponde con un errore (5xx), il provider deve implementare una strategia di retry. Il pattern standard è il backoff esponenziale con jitter: il primo retry avviene dopo 1 minuto, il secondo dopo 5 minuti, il terzo dopo 25 minuti, fino a un massimo di 24-72 ore. Il jitter (variazione casuale del delay) previene thundering herd quando migliaia di webhook falliscono contemporaneamente e tentano il retry allo stesso istante. I provider maturi come Stripe, GitHub e Twilio implementano anche dead letter queues: dopo N tentativi falliti, il webhook viene marcato come failed e il consumer riceve una notifica. La best practice lato consumer è rispondere con 200 OK il più rapidamente possibile (entro 5-10 secondi) e processare il payload in modo asincrono tramite una coda interna."},{title:"4. Pattern architetturali: idempotenza e ordering",text:`Due sfide architetturali fondamentali affliggono i webhooks. La prima è l'idempotenza: a causa dei retry, lo stesso evento può essere consegnato più volte. Il consumer deve essere progettato per gestire duplicati senza effetti collaterali — tipicamente memorizzando l'ID dell'evento e ignorando le consegne successive. La seconda è l'ordinamento: i webhook non garantiscono che gli eventi arrivino nell'ordine in cui si sono verificati. Un evento "payment.succeeded" potrebbe arrivare prima di "payment.created" se il primo retry di quest'ultimo ha avuto un delay. Il consumer deve implementare logica di riconciliazione, tipicamente usando timestamp dell'evento e non dell'arrivo, oppure accettando eventi fuori ordine e ricostruendo lo stato con pattern event sourcing.`},{title:"5. Standard emergenti e il futuro dei webhooks",text:"Nonostante la diffusione capillare (praticamente ogni SaaS offre webhooks), fino al 2023 non esisteva uno standard formale. Ogni provider implementava la propria variante con header diversi, algoritmi di firma diversi e formati di payload diversi. Il progetto Standard Webhooks (standardwebhooks.com), sostenuto da Svix, cerca di unificare queste pratiche definendo header standardizzati (webhook-id, webhook-timestamp, webhook-signature), algoritmo di firma (HMAC-SHA256 con base64) e best practice per retry e versioning. CloudEvents (CNCF) offre un'alternativa più ampia, definendo un formato envelope standard per eventi cloud indipendentemente dal trasporto (HTTP, AMQP, Kafka, MQTT). L'evoluzione naturale dei webhooks punta verso sistemi event-driven più sofisticati con EventBridge (AWS), Eventarc (GCP) e Event Grid (Azure)."}]},codeSnippets:[{title:"handler_hmac.js",lang:"javascript",code:`const express = require('express');
const crypto = require('crypto');
const app = express();

// Body raw necessario per verificare la firma HMAC
app.use('/webhooks', express.raw({ type: 'application/json' }));

const WEBHOOK_SECRET = process.env.WEBHOOK_SECRET;

function verifySignature(payload, signature, timestamp) {
  // Previeni replay attack (max 5 minuti)
  const currentTime = Math.floor(Date.now() / 1000);
  if (Math.abs(currentTime - parseInt(timestamp)) > 300) {
    throw new Error('Timestamp troppo vecchio — possibile replay attack');
  }

  // Calcola HMAC-SHA256
  const signedPayload = \`\${timestamp}.\${payload}\`;
  const expectedSig = crypto
    .createHmac('sha256', WEBHOOK_SECRET)
    .update(signedPayload)
    .digest('hex');

  // Confronto timing-safe per prevenire timing attack
  const expected = Buffer.from(expectedSig, 'hex');
  const received = Buffer.from(signature, 'hex');

  if (!crypto.timingSafeEqual(expected, received)) {
    throw new Error('Firma HMAC non valida');
  }
}

app.post('/webhooks/stripe', (req, res) => {

});

import asyncio
import hashlib
import hmac
import time
import json
import random
from dataclasses import dataclass

@dataclass
class WebhookDelivery:
    url: str
    payload: dict
    event_id: str
    event_type: str
    secret: str
    max_retries: int = 5

async def deliver_webhook(delivery: WebhookDelivery) -> bool:
    """Consegna un webhook con backoff esponenziale e jitter."""

    timestamp = str(int(time.time()))
    body = json.dumps(delivery.payload, separators=(',', ':'))

    # Calcola firma HMAC-SHA256
    signed_payload = f"{timestamp}.{body}"
    signature = hmac.new(
        delivery.secret.encode(),
        signed_payload.encode(),
        hashlib.sha256
    ).hexdigest()

    headers = {
        'Content-Type': 'application/json',
        'X-Webhook-ID': delivery.event_id,
        'X-Webhook-Timestamp': timestamp,
        'X-Webhook-Signature': f'sha256={signature}',
        'X-Webhook-Event': delivery.event_type,
        'User-Agent': 'WebhookService/1.0',
    }

    for attempt in range(delivery.max_retries + 1):
        try:
            async with httpx.AsyncClient(timeout=10.0) as client:
                response = await client.post(
                    delivery.url, content=body, headers=headers
                )
                if 200 <= response.status_code < 300:
                    print(f"[OK] Webhook {delivery.event_id} consegnato")
                    return True

                if response.status_code < 500:
                    print(f"[FAIL] Client error {response.status_code}")
                    return False  # Non ritentare errori 4xx

        except (httpx.ConnectError, httpx.TimeoutException) as e:
            print(f"[RETRY {attempt+1}] {type(e).__name__}")

        # Backoff esponenziale con jitter
        if attempt < delivery.max_retries:
            delay = min(2 ** attempt * 60, 3600)  # Max 1 ora
            jitter = random.uniform(0, delay * 0.1)
            await asyncio.sleep(delay + jitter)

    print(f"[DEAD] Webhook {delivery.event_id} non consegnato")
    return False`},{title:"signature_verify.py",lang:"python",code:`"""
Verifica della firma webhook — compatibile con Stripe, GitHub, Twilio.
Implementa confronto timing-safe e protezione replay attack.
"""

import hmac
import hashlib
import time
from typing import Optional


class WebhookVerificationError(Exception):
    """Errore nella verifica del webhook."""
    pass


def verify_webhook_signature(
    payload: bytes,
    signature_header: str,
    secret: str,
    timestamp: Optional[str] = None,
    tolerance_seconds: int = 300
) -> bool:
    """
    Verifica la firma HMAC-SHA256 di un webhook.

    Args:
        payload: Body raw della richiesta HTTP
        signature_header: Valore dell'header di firma
        secret: Chiave segreta condivisa con il provider
        timestamp: Timestamp incluso nella firma (opzionale)
        tolerance_seconds: Finestra temporale accettabile
    """
    # Protezione replay attack
    if timestamp:
        event_time = int(timestamp)
        current_time = int(time.time())
        if abs(current_time - event_time) > tolerance_seconds:
            raise WebhookVerificationError(
                f"Timestamp fuori finestra: {abs(current_time - event_time)}s"
            )
        signed_payload = f"{timestamp}.".encode() + payload
    else:
        signed_payload = payload

    # Calcola HMAC atteso
    expected = hmac.new(
        secret.encode('utf-8'),
        signed_payload,
        hashlib.sha256
    ).hexdigest()

    # Estrai firma (gestisce prefisso "sha256=")
    received = signature_header
    if received.startswith('sha256='):
        received = received[7:]

    # Confronto timing-safe (previene timing attack)
    if not hmac.compare_digest(expected, received):
        raise WebhookVerificationError("Firma HMAC non valida")

ventato nel 1999 da Andy Stanford-Clark (IBM) e Arlen Nipper (Eurotech, allora Arcom) per un caso d'uso molto specifico: monitorare oleodotti nel deserto del Sahara via connessione satellitare VSAT. I requisiti erano estremi: bandwidth minima (le connessioni satellitari costavano per byte), alta latenza, connessioni instabili e dispositivi con CPU e memoria limitatissime. MQTT fu progettato per soddisfare tutti questi vincoli: l'header minimo è di soli 2 byte, il protocollo è stateful (mantiene la sessione), supporta tre livelli di Quality of Service e gestisce autonomamente la riconnessione. Queste caratteristiche lo hanno reso il protocollo dominante nell'IoT, con miliardi di dispositivi connessi nel 2024."},{title:"2. Il modello Publish/Subscribe e il ruolo del Broker",text:`MQTT implementa il pattern Publish/Subscribe con disaccoppiamento totale tra mittente e destinatario. I publisher inviano messaggi a un "topic" (una stringa gerarchica come "casa/soggiorno/temperatura") senza conoscere né il numero né l'identità dei subscriber. I subscriber si registrano presso il broker dichiarando i topic di interesse, usando anche wildcard: "+" per un singolo livello (casa/+/temperatura) e "#" per tutti i sotto-livelli (casa/#). Il broker (come Mosquitto, HiveMQ, EMQX o VerneMQ) è il componente centrale: riceve tutti i messaggi, gestisce le sottoscrizioni, implementa il QoS, mantiene le sessioni e distribuisce i messaggi ai subscriber interessati. Questo disaccoppiamento — spaziale (i client non si conoscono), temporale (possono non essere online contemporaneamente) e di sincronizzazione (le operazioni sono asincrone) — è la forza fondamentale di MQTT.`},{title:"3. Quality of Service: QoS 0, 1 e 2",text:`MQTT definisce tre livelli di Quality of Service che bilanciano affidabilità e overhead. QoS 0 ("at most once", fire-and-forget): il messaggio viene inviato una sola volta senza conferma. È il più veloce e leggero ma può perdere messaggi se la connessione si interrompe. Ideale per telemetria ad alta frequenza dove la perdita occasionale è accettabile (es. temperatura ogni secondo). QoS 1 ("at least once"): il broker conferma la ricezione con PUBACK. Se il publisher non riceve conferma, ritrasmette. Garantisce la consegna ma può generare duplicati. Ideale per la maggior parte degli scenari IoT. QoS 2 ("exactly once"): implementa un handshake a quattro fasi (PUBLISH → PUBREC → PUBREL → PUBCOMP) che garantisce che ogni messaggio venga consegnato esattamente una volta. L'overhead è maggiore ma è essenziale per scenari come pagamenti, comandi critici o aggiornamenti firmware dove i duplicati causerebbero danni.`},{title:"4. Retained Messages, Last Will e Session Persistence",text:`MQTT offre tre meccanismi avanzati che lo distinguono dagli altri protocolli pub/sub. I Retained Messages permettono al broker di memorizzare l'ultimo messaggio pubblicato su un topic: quando un nuovo subscriber si connette, riceve immediatamente l'ultimo valore noto senza attendere la prossima pubblicazione — essenziale per dashboard IoT che devono mostrare lo stato corrente all'apertura. Il Last Will and Testament (LWT) è un messaggio che il client registra alla connessione e che il broker pubblica automaticamente se il client si disconnette inaspettatamente — usato per notificare "dispositivo offline" senza polling. La Session Persistence (Clean Session = false in v3.1.1, Session Expiry Interval in v5.0) permette al broker di memorizzare le sottoscrizioni e i messaggi QoS 1/2 non consegnati durante una disconnessione, recapitandoli alla riconnessione.`},{title:"5. MQTT 5.0 e l'evoluzione del protocollo",text:"La versione 5.0, ratificata OASIS nel 2019, introduce miglioramenti significativi. Le User Properties sono coppie chiave-valore arbitrarie nei pacchetti, equivalenti agli HTTP headers, che abilitano metadata applicativi senza modificare il payload. Il Shared Subscriptions permette il load balancing nativo: più subscriber sullo stesso topic condiviso ricevono ciascuno solo una porzione dei messaggi, distribuendo il carico. Il Topic Alias riduce il bandwidth sostituendo topic lunghi con alias numerici dopo la prima pubblicazione. Il Flow Control permette al client di dichiarare quanti messaggi può gestire contemporaneamente, prevenendo overload. Il Request/Response pattern aggiunge correlation data e response topic, permettendo pattern richiesta-risposta sopra pub/sub. Questi miglioramenti rendono MQTT 5.0 adatto non solo all'IoT ma anche a scenari di messaging enterprise precedentemente dominati da AMQP e Kafka."}]},codeSnippets:[{title:"publisher.py",lang:"python",code:`import paho.mqtt.client as mqtt

from datetime import datetime

BROKER = "mqtt.example.com"
PORT = 8883  # TLS
TOPIC_BASE = "factory/line-3/cnc"

def on_connect(client, userdata, flags, rc, properties=None):
    if rc == 0:
        print(f"[{datetime.now().isoformat()}] Connesso al broker MQTT")
    else:
        print(f"Connessione fallita con codice: {rc}")

def on_publish(client, userdata, mid, rc=None, properties=None):
    print(f"  Messaggio {mid} confermato dal broker")

# Inizializza client MQTT 5.0
client = mqtt.Client(
    client_id="cnc-sensor-042",
    protocol=mqtt.MQTTv5,
    callback_api_version=mqtt.CallbackAPIVersion.VERSION2
)

    ca_certs="/etc/mqtt/ca.pem",
    certfile="/etc/mqtt/client.pem",
    keyfile="/etc/mqtt/client-key.pem",
    tls_version=ssl.PROTOCOL_TLS_CLIENT
)

# Last Will: notifica automatica se il sensore va offline
client.will_set(
    topic=f"{TOPIC_BASE}/status",
    payload=json.dumps({"status": "offline", "sensor": "cnc-042"}),
    qos=1,
    retain=True
)

client.on_connect = on_connect
client.on_publish = on_publish
client.connect(BROKER, PORT)
client.loop_start()

# Pubblica telemetria ogni 2 secondi
try:
    while True:
        telemetry = {
            "timestamp": datetime.now().isoformat(),
            "sensor_id": "cnc-042",
            "spindle_rpm": 12400,
            "temperature_c": 67.3,
            "vibration_mm_s": 2.1,
            "tool_wear_pct": 34.5,
            "power_kw": 8.7
        }
        client.publish(
            topic=f"{TOPIC_BASE}/telemetry",
            payload=json.dumps(telemetry),
            qos=1,
            retain=False
        )
        time.sleep(2)

    client.publish(f"{TOPIC_BASE}/status",

    client.disconnect()`},{title:"subscriber.py",lang:"python",code:`import paho.mqtt.client as mqtt
import json
from datetime import datetime

BROKER = "mqtt.example.com"
PORT = 8883

# Soglie di allarme
THRESHOLDS = {
    "temperature_c": {"warn": 75.0, "critical": 85.0},
    "vibration_mm_s": {"warn": 3.0, "critical": 5.0},
    "tool_wear_pct": {"warn": 70.0, "critical": 90.0},
}

def on_connect(client, userdata, flags, rc, properties=None):
    print(f"[{datetime.now().isoformat()}] Subscriber connesso")
    # Sottoscrivi con wildcard a tutti i sensori della linea 3
    client.subscribe("factory/line-3/+/telemetry", qos=1)
    client.subscribe("factory/line-3/+/status", qos=1)
    # Shared Subscription (MQTT 5.0) per load balancing
    client.subscribe("$share/monitors/factory/#", qos=1)

def on_message(client, userdata, msg):
    try:
        payload = json.loads(msg.payload.decode())
        if msg.topic.endswith('/status'):
            handle_status(payload)
        elif msg.topic.endswith('/telemetry'):
            handle_telemetry(payload, msg.topic)
    except json.JSONDecodeError:
        print(f"Payload non valido su {msg.topic}")

def handle_status(payload):
    status = payload.get('status', 'unknown')
    sensor = payload.get('sensor', 'N/A')
    icon = "🔴" if status == "offline" else "🟢"
    print(f"  {icon} Sensore {sensor}: {status}")

def handle_telemetry(data, topic):
    sensor_id = data.get('sensor_id', 'unknown')
    alerts = []
    for metric, limits in THRESHOLDS.items():
        value = data.get(metric)
        if value and value >= limits['critical']:
            alerts.append(f"CRITICO: {metric}={value}")
        elif value and value >= limits['warn']:
            alerts.append(f"AVVISO: {metric}={value}")
    if alerts:
        print(f"  [{sensor_id}] {', '.join(alerts)}")

client = mqtt.Client(
    client_id="monitor-dashboard-01",
    protocol=mqtt.MQTTv5,
    callback_api_version=mqtt.CallbackAPIVersion.VERSION2
)
client.on_connect = on_connect
client.on_message = on_message
client.tls_set(ca_certs="/etc/mqtt/ca.pem")
client.connect(BROKER, PORT)
client.loop_forever()`},{title:"mosquitto.conf",lang:"bash",code:`# ═══════════════════════════════════════════
# Configurazione Mosquitto MQTT Broker
# Produzione con TLS, ACL e persistence
# ═══════════════════════════════════════════

# ─── Network ───
listener 8883
protocol mqtt

# WebSocket listener per client browser
listener 9001
protocol websockets

# ─── TLS/SSL ───
certfile /etc/mosquitto/certs/server.crt
keyfile /etc/mosquitto/certs/server.key
cafile /etc/mosquitto/certs/ca.crt
require_certificate false
tls_version tlsv1.3

# ─── Autenticazione ───
allow_anonymous false
password_file /etc/mosquitto/passwd
acl_file /etc/mosquitto/acl

# ─── Persistenza ───
persistence true
persistence_location /var/lib/mosquitto/
persistence_file mosquitto.db
autosave_interval 300

# ─── Limiti ───
max_connections 10000
max_inflight_messages 100
max_queued_messages 5000
message_size_limit 262144  # 256KB

# ─── Logging ───
log_dest file /var/log/mosquitto/mosquitto.log
log_type all
connection_messages true
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S`}],cases:[{company:"Facebook Messenger",year:"2011",problem:"Facebook necessitava di un protocollo per la chat mobile che funzionasse su reti 2G/3G instabili, con latenza alta e bandwidth limitata. HTTP long-polling consumava troppa batteria e banda.",metric:"MQTT ha permesso a Facebook Messenger di ridurre del 40% il consumo batteria e mantenere notifiche real-time su reti con 200ms+ di latenza",link:"https://engineering.fb.com/2011/08/12/android/building-facebook-messenger/"},{company:"Flotte IoT industriali CNC",year:"2016",problem:"I produttori di macchine CNC dovevano monitorare in tempo reale migliaia di macchine utensili distribuite in fabbriche diverse, con sensori che generano dati ogni 100ms.",metric:"MQTT gestisce 500.000+ messaggi/secondo per fabbrica con latenza end-to-end sotto i 50ms e overhead di 2-4 byte per messaggio",link:"https://www.hivemq.com/case-studies/manufacturing/"},{company:"AWS IoT Core",year:"2015",problem:"Amazon Web Services doveva offrire un servizio managed per connettere miliardi di dispositivi IoT al cloud con un protocollo leggero, standardizzato e con supporto nativo per QoS e sessioni persistenti.",metric:"AWS IoT Core gestisce oltre 1 trilione di messaggi MQTT al mese per centinaia di migliaia di clienti enterprise",link:"https://aws.amazon.com/iot-core/"}],radar:{latency:9,scalability:8,simplicity:8,overhead:10,browser:5,maturity:9}}],zp=[{name:"Vittorio Ardente",role:"IoT Platform Lead",initials:"VA",avatar:"fire",specialization:"Esperto di API MQTT",color:c.cyan,skills:["MQTT v5","Mosquitto","AWS IoT","Python"],bio:"Specializzato in architetture IoT distribuite e comunicazione machine-to-machine su reti a bassa banda."},{name:"Jerome Colcol",role:"Frontend API Architect",initials:"JC",avatar:"rice",specialization:"Esperto di API GraphQL",color:c.violet,skills:["GraphQL","Apollo","React","TypeScript"],bio:"Progetta API GraphQL scalabili con focus su developer experience e ottimizzazion       <div class="loader-particle" style="width:2px;height:2px;background:#06d6a0;left:70%;bottom:20%;animation-duration:5s;animation-delay:0.5s;"></div>
      <div class="loader-particle" style="width:4px;height:4px;background:#8b5cf6;left:45%;bottom:40%;animation-duration:6s;animation-delay:1s;"></div>
      <div class="loader-particle" style="width:2px;height:2px;background:#0ea5e9;left:80%;bottom:50%;animation-duration:4.5s;animation-delay:1.5s;"></div>
      <div class="loader-particle" style="width:3px;height:3px;background:#06d6a0;left:30%;bottom:15%;animation-duration:5.5s;animation-delay:2s;"></div>

      <!-- Logo animation -->
      <div class="loader-logo-wrap">
        <!-- Hexagon ring -->
        <div class="loader-hex-ring">
          <svg viewBox="0 0 120 120" fill="none">
            <polygon class="loader-hex-path" points="60,8 108,30 108,90 60,112 12,90 12,30" stroke="url(#loaderGrad)" stroke-width="1.5" fill="none"/>
            <defs>
              <linearGradient id="loaderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#0ea5e9"/>
                <stop offset="50%" stop-color="#06d6a0"/>
                <stop offset="100%" stop-color="#8b5cf6"/>
              </linearGradient>
            </defs>
          </svg>
        </div>

        <!-- Orbiting dots -->
        <div class="loader-orbit">
          <div class="loader-orbit-dot loader-orbit-dot-1"></div>
          <div class="loader-orbit-dot loader-orbit-dot-2"></div>
        </div>
        <div class="loader-orbit-2">
          <div class="loader-orbit-dot-3"></div>
        </div>

        <!-- Center logo -->
        <div class="loader-center-logo">
          <svg viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="12" r="5" stroke="#0ea5e9" stroke-width="1.5" fill="rgba(14,165,233,0.15)"/>
            <circle cx="12" cy="32" r="5" stroke="#06d6a0" stroke-width="1.5" fill="rgba(6,214,160,0.15)"/>
            <circle cx="36" cy="32" r="5" stroke="#8b5cf6" stroke-width="1.5" fill="rgba(139,92,246,0.15)"/>
            <line x1="24" y1="17" x2="14" y2="28" stroke="#0ea5e9" stroke-width="1" opacity="0.6"/>
            <line x1="24" y1="17" x2="34" y2="28" stroke="#8b5cf6" stroke-width="1" opacity="0.6"/>
            <line x1="17" y1="32" x2="31" y2="32" stroke="#06d6a0" stroke-width="1" opacity="0.6"/>
            <circle cx="24" cy="24" r="3" fill="#0ea5e9" opacity="0.5"/>
          </svg>
        </div>
      </div>

      <!-- Title -->
      <div class="loader-title">APIFLOW</div>
      <div class="loader-subtitle">INIZIALIZZAZIONE SISTEMA<span class="loader-dots-anim"></span></div>

      <!-- Progress bar -->
      <div class="loader-progress-track">
        <div class="loader-progress-fill"></div>
        <div class="loader-progress-shimmer"></div>
      </div>
    </div>

    <div id="root"></div>
  </body>
</html>
